name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'        # triggers on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:    # allows manual trigger from GitHub UI
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write       # needed to create GitHub Releases

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build macOS (.dmg — universal: x64 + arm64)
  # ─────────────────────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # --publish never is CRITICAL — without it, electron-builder calls the
      # GitHub Releases API during the build to check for existing releases,
      # failing with 404 because the release doesn't exist yet.
      # The release job below is the only place that touches GitHub API.
      #
      # CODE SIGNING (optional): to remove the macOS Gatekeeper warning, add
      # these secrets in repo Settings → Secrets → Actions, then uncomment
      # the env block below and re-add it:
      #   CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
      #   CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
      #   APPLE_ID: ${{ secrets.APPLE_ID }}
      #   APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Build macOS DMG (x64 + arm64)
        run: npx electron-builder --mac --x64 --arm64 --publish never

      - name: List dist output
        run: ls -lh dist/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: |
            dist/*.dmg
            dist/latest-mac.yml
          if-no-files-found: error
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Build Windows (.exe NSIS installer)
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Same --publish never fix as the macOS job above.
      # CODE SIGNING (optional): to remove the Windows SmartScreen warning,
      # add these secrets in repo Settings → Secrets → Actions, then add an
      # env block with:
      #   WIN_CSC_LINK: ${{ secrets.WIN_CERT_P12_BASE64 }}
      #   WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
      - name: Build Windows installer
        run: npx electron-builder --win --x64 --publish never

      - name: List dist output
        run: dir dist

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-dist
          path: |
            dist/*.exe
            dist/latest.yml
          if-no-files-found: error
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Create GitHub Release (runs only after BOTH builds succeed)
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-dist
          path: release-assets/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-dist
          path: release-assets/

      - name: List release assets
        run: ls -lh release-assets/

      - name: Extract version from tag or input
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Extract release notes from CHANGELOG.md
        id: release_notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for full details."
          fi
          {
            echo "NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', steps.get_version.outputs.VERSION) }}
          name: "Pharmacy PRQ Tool v${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## Pharmacy PRQ Tool — v${{ steps.get_version.outputs.VERSION }}

            ${{ steps.release_notes.outputs.NOTES }}

            ---

            ### 📦 Download

            | Platform | File | Notes |
            |----------|------|-------|
            | 🍎 macOS (Apple Silicon + Intel) | `.dmg` file below | Universal binary — works on M1/M2/M3 and Intel |
            | 🪟 Windows 10 / 11 | `Setup.exe` file below | NSIS installer — 64-bit |

            ### ⚡ Quick Start
            - **macOS:** Open the `.dmg`, drag the app to `/Applications`, launch it.
              _Gatekeeper warning?_ → System Settings → Privacy & Security → **Open Anyway**
            - **Windows:** Run the `Setup.exe`, follow the wizard. Desktop shortcut created automatically.

          files: release-assets/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
